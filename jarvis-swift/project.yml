name: Jarvis
options:
  bundleIdPrefix: com.jarvis
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Jarvis:
    type: application
    platform: macOS
    sources:
      - path: Jarvis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Jarvis/Jarvis.entitlements
    info:
      path: Jarvis/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Jarvis uses the microphone for voice commands."
        NSSpeechRecognitionUsageDescription: "Jarvis uses speech recognition to transcribe your voice commands."
        NSHumanReadableCopyright: ""
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
